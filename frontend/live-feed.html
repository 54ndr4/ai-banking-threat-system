<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Live Threat Feed</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div class="layout">

        <!-- SIDEBAR -->

        <div class="sidebar">

            <div class="sidebar-logo">

                <i class="fa-solid fa-rss"></i>

                <h2>AI SOC</h2>

            </div>

            <a href="dashboard.html">
                <i class="fa-solid fa-chart-line"></i>
                Dashboard
            </a>

            <a href="network.html">
                <i class="fa-solid fa-network-wired"></i>
                Network
            </a>

            <a href="analysis.html">
                <i class="fa-solid fa-brain"></i>
                Analysis
            </a>

            <a href="reports.html">
                <i class="fa-solid fa-file-shield"></i>
                Reports
            </a>

            <a href="live-feed.html" class="active">
                <i class="fa-solid fa-rss"></i>
                Live Threat Feed
            </a>

            <button onclick="logout()">

                <i class="fa-solid fa-right-from-bracket"></i>

                Logout

            </button>

        </div>

        <!-- MAIN -->

        <div class="main-content">

            <div class="navbar">

                <div>

                    <h1>Live Threat Feed</h1>

                    <p>
                        Real-time threat monitoring and event logging
                    </p>

                </div>

                <div class="status-bar">

                    <div class="live-status">
                        <span class="dot"></span>
                        LIVE
                    </div>

                    <div class="time-status">
                        <span id="clock"></span>
                    </div>

                </div>

            </div>

            <select id="downloadRange">

                <option value="10">
                    Last 10 Logs
                </option>

                <option value="50">
                    Last 50 Logs
                </option>

                <option value="100">
                    Last 100 Logs
                </option>

                <option value="all">
                    All Logs
                </option>

            </select>

            <button class="download-btn" onclick="downloadThreatFeed()">

                <i class="fa-solid fa-download"></i>
                Download Live Feed

            </button>

            <div class="logs-section">

                <div class="panel-header">

                    <h2>Threat Activity Logs</h2>

                </div>

                <table>

                    <thead>

                        <tr>
                            <th>Time</th>
                            <th>Node</th>
                            <th>Threat</th>
                            <th>Severity</th>
                        </tr>

                    </thead>

                    <tbody id="logsBody">

                    </tbody>

                </table>



                <script>

                    function loadThreatLogs() {

                        const logsBody =
                            document.getElementById(
                                "logsBody"
                            );

                        if (!logsBody) return;

                        const logs =

                            JSON.parse(
                                localStorage.getItem(
                                    "threatLogs"
                                )
                            ) || [];

                        logsBody.innerHTML = "";

                        logs.forEach(log => {

                            logsBody.innerHTML += `

        <tr>

            <td>${log.time}</td>

            <td>${log.node}</td>

            <td>${log.threat}</td>

            <td>${log.severity}</td>

        </tr>

        `;

                        });

                    }

                    loadThreatLogs();

                    setInterval(
                        loadThreatLogs,
                        2000
                    );

                </script>

            </div>

        </div>

    </div>

    <script src="js/app.js"></script>
    <script src="js/simulation.js"></script>

    <script>

        function downloadThreatFeed() {

            const rows =
                document.querySelectorAll("#logsBody tr");

            let report =

                `=================================
AI SOC LIVE THREAT FEED
=================================

Generated:
${new Date().toLocaleString()}

`;

            rows.forEach(row => {

                const cols =
                    row.querySelectorAll("td");

                if (cols.length === 4) {

                    report +=

                        `Time: ${cols[0].innerText}
Node: ${cols[1].innerText}
Threat: ${cols[2].innerText}
Severity: ${cols[3].innerText}

--------------------------------

`;

                }

            });

            const blob = new Blob(
                [report],
                { type: "text/plain" }
            );

            const link =
                document.createElement("a");

            link.href =
                URL.createObjectURL(blob);

            link.download =
                `Threat_Feed_${Date.now()}.txt`;

            link.click();
        }

    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        AI Banking Security Login
    </title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

    <div class="login-page">

        <div class="login-left">

            <div class="login-info">

                <h1>

                    AI Banking Threat
                    Security System

                </h1>

                <p>

                    Futuristic AI powered
                    banking infrastructure
                    defense and monitoring
                    platform for enterprise
                    cyber threat detection.

                </p>

            </div>

        </div>


        <div class="login-right">

            <div class="login-box">

                <div class="login-logo">

                    <i class="fa-solid fa-shield-halved"></i>

                </div>

                <h2>

                    Administrator Login

                </h2>


                <div class="input-group">

                    <i class="fa-solid fa-user"></i>

                    <input type="text" id="username" placeholder="Administrator Username">

                </div>


                <div class="input-group">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password" id="password" placeholder="Administrator Password">

                </div>


                <button id="loginBtn">

                    ACCESS SYSTEM

                </button>

                <p id="loginMessage"></p>

            </div>

        </div>

    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>

</html>
